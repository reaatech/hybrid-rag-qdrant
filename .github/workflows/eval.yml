name: Evaluation

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'datasets/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  evaluate:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run evaluation
        continue-on-error: true
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY not set — skipping evaluation"
            exit 0
          fi
          node packages/hybrid-rag-cli/dist/index.js evaluate \
            --dataset datasets/examples/sample.jsonl \
            --output eval-results.json
        env:
          QDRANT_URL: http://localhost:6333
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Post results
        if: always()
        run: |
          if [ -f eval-results.json ]; then
            echo "## Evaluation Results" >> $GITHUB_STEP_SUMMARY
            cat eval-results.json >> $GITHUB_STEP_SUMMARY
          else
            echo "## Evaluation" >> $GITHUB_STEP_SUMMARY
            echo "Skipped — OPENAI_API_KEY secret not configured" >> $GITHUB_STEP_SUMMARY
          fi
